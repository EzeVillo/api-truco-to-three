version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: truco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: truco
      POSTGRES_USER: truco
      POSTGRES_PASSWORD: truco
      TZ: America/Argentina/Buenos_Aires
      PGTZ: America/Argentina/Buenos_Aires
    ports:
      - "5432:5432"
    volumes:
      - truco-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U truco" ]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: truco-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  truco-postgres-data: