spring:
  datasource:
    url: jdbc:h2:mem:trucotest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

truco:
  retry:
    max-retries: 3
    delay-ms: 0
