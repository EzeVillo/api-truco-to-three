spring:
  application:
    name: truco
  datasource:
    url: jdbc:postgresql://localhost:5432/truco
    username: ${TRUCO_DB_USER:truco}
    password: ${TRUCO_DB_PASSWORD:truco}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

truco:
  retry:
    max-retries: 3
    delay-ms: 200
  observability:
    scheduler-heartbeat-max-age-ms: 180000
  match:
    idle-timeout-seconds: 300
    timeout-check-interval-ms: 30000
  security:
    jwt-secret: ${TRUCO_JWT_SECRET:truco-local-dev-secret-key-32-bytes}
    issuer: ${TRUCO_JWT_ISSUER:truco-api}
    audience: ${TRUCO_JWT_AUDIENCE:truco-clients}
    access-token-expiration-seconds: 86400

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId:-no-request}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.villo.truco: DEBUG

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,schedulerHeartbeat
