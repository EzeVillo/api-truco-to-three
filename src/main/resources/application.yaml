server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: truco
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/truco}
    username: ${TRUCO_DB_USER:truco}
    password: ${TRUCO_DB_PASSWORD:truco}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 32
  flyway:
    enabled: true

truco:
  web:
    allowed-origins: ${TRUCO_ALLOWED_ORIGINS:http://localhost:4200,https://*.trycloudflare.com,https://localhost,capacitor://localhost}
  retry:
    max-retries: 3
    delay-ms: 200
  timeout:
    scheduler:
      pool-size: 4
    safety-net-interval: 300000
  observability:
    scheduler-heartbeat-max-age-ms: 180000
  social:
    friendship:
      max-friends: 10
    invitation-expiration:
      match: PT10M
      league: PT30M
      cup: PT30M
  match:
    lobby-timeout-seconds: 300
    play-timeout-seconds: 30
  recording:
    enabled: ${TRUCO_RECORDING_ENABLED:false}
  league:
    lobby-timeout-seconds: 600
  cup:
    lobby-timeout-seconds: 600
  rematch:
    duration: PT2M
    batch-size: 50
  security:
    jwt-secret: ${TRUCO_JWT_SECRET:truco-local-dev-secret-key-32-bytes}
    issuer: ${TRUCO_JWT_ISSUER:truco-api}
    audience: ${TRUCO_JWT_AUDIENCE:truco-clients}
    user-access-token-expiration-seconds: ${TRUCO_USER_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
    guest-access-token-expiration-seconds: ${TRUCO_GUEST_ACCESS_TOKEN_EXPIRATION_SECONDS:604800}
    refresh-token-expiration-seconds: ${TRUCO_REFRESH_TOKEN_EXPIRATION_SECONDS:2592000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId:-no-request}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.villo.truco: ${TRUCO_LOG_LEVEL:DEBUG}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,schedulerHeartbeat
