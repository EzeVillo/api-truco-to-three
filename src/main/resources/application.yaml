spring:
  application:
    name: truco

truco:
  match:
    games-to-win: 3
    points-to-win-game: 3
  security:
    jwt-secret: ${TRUCO_JWT_SECRET:change-me-in-production}
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 86400
    session-grant-expiration-seconds: 60
