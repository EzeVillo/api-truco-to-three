$kind: http-request
url: "{{URL_BASE_TRUCO_HTTP}}/cups"
method: POST
body:
  type: json
  content: "{\r

    \  \"numberOfPlayers\": 4,\r

    \  \"gamesToPlay\": 3,\r

    \  \"visibility\": \"PRIVATE\"\r

    }"
scripts:
  - type: afterResponse
    code: "const response = pm.response.json();\r

      \r

      pm.environment.set(\"cupId\", response.cupId);\r

      pm.environment.set(\"joinCode\", response.joinCode);\r

      pm.environment.set(\"parentType\", \"CUP\");\r

      pm.environment.set(\"parentId\", response.cupId);"
    language: text/javascript
examples: .resources/Create cup.resources/examples
order: 1000
