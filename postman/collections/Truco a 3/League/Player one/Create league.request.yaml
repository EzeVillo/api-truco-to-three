$kind: http-request
url: "{{URL_BASE_TRUCO_HTTP}}/leagues"
method: POST
body:
  type: json
  content: "{\r

    \  \"numberOfPlayers\": 4,\r

    \  \"gamesToPlay\": 3,\r

    \  \"visibility\": \"PRIVATE\"\r

    }"
scripts:
  - type: afterResponse
    code: "const response = pm.response.json();\r

      \r

      pm.environment.set(\"leagueId\", response.leagueId);\r

      pm.environment.set(\"joinCode\", response.joinCode);\r

      pm.environment.set(\"parentType\", \"LEAGUE\");\r

      pm.environment.set(\"parentId\", response.leagueId);"
    language: text/javascript
examples: .resources/Create league.resources/examples
order: 1000
