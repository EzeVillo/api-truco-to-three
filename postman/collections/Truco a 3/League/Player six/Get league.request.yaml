$kind: http-request
url: "{{URL_BASE_TRUCO_HTTP}}/leagues/{{leagueId}}"
method: GET
scripts:
  - type: afterResponse
    code: "const response = pm.response.json();\r

      \r

      let matchId = null;\r

      \r

      for (const matchday of response.matchdays) {\r

      \    for (const fixture of matchday.fixtures) {\r

      \        if (fixture.status === \"PENDING\" && fixture.matchId) {\r

      \            matchId = fixture.matchId;\r

      \            break;\r

      \        }\r

      \    }\r

      \    if (matchId) break;\r

      }\r

      \r

      if (matchId) {\r

      \    pm.environment.set(\"matchId\", matchId);\r

      \    console.log(\"matchId guardado:\", matchId);\r

      } else {\r

      \    console.log(\"No se encontró ningún fixture PENDING\");\r

      }"
    language: text/javascript
order: 2000
