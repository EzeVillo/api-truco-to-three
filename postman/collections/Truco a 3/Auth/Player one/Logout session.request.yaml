$kind: http-request
name: Logout session
url: "{{URL_BASE_TRUCO_HTTP}}/auth/logout"
method: DELETE
body:
  type: json
  content: "{\r

    \  \"refreshToken\": \"{{refreshTokenPlayerOne}}\"\r

    }"
scripts:
  - type: afterResponse
    code: "if (pm.response.code === 204) {\r

      \    pm.environment.unset(\"accessTokenPlayerOne\");\r

      \    pm.environment.unset(\"refreshTokenPlayerOne\");\r

      \    pm.environment.unset(\"accessTokenPlayerOneExpiresAt\");\r

      \    pm.environment.unset(\"refreshTokenPlayerOneExpiresAt\");\r

      }"
    language: text/javascript
order: 4000
