$kind: collection
name: Truco a 3
scripts:
  - type: http:beforeRequest
    code: >
      (async () => {
          const PLAYER_CONFIG = {
              "Player one": {
                  accessToken: "accessTokenPlayerOne",
                  accessTokenExpiresAt: "accessTokenPlayerOneExpiresAt",
                  refreshTokenVariable: "refreshTokenPlayerOne",
                  refreshTokenExpiresAt: "refreshTokenPlayerOneExpiresAt",
                  reauthRequest: "Auth > Player one > Login user"
              },
              "Player two": {
                  accessToken: "accessTokenPlayerTwo",
                  accessTokenExpiresAt: "accessTokenPlayerTwoExpiresAt",
                  refreshTokenVariable: "refreshTokenPlayerTwo",
                  refreshTokenExpiresAt: "refreshTokenPlayerTwoExpiresAt",
                  reauthRequest: "Auth > Player two > Login user"
              },
              "Player three": {
                  accessToken: "accessTokenPlayerThree",
                  accessTokenExpiresAt: "accessTokenPlayerThreeExpiresAt",
                  reauthRequest: "Auth > Player three > Use guest"
              },
              "Player four": {
                  accessToken: "accessTokenPlayerFour",
                  accessTokenExpiresAt: "accessTokenPlayerFourExpiresAt",
                  reauthRequest: "Auth > Player four > Use guest"
              },
              "Player five": {
                  accessToken: "accessTokenPlayerFive",
                  accessTokenExpiresAt: "accessTokenPlayerFiveExpiresAt",
                  reauthRequest: "Auth > Player five > Use guest"
              },
              "Player six": {
                  accessToken: "accessTokenPlayerSix",
                  accessTokenExpiresAt: "accessTokenPlayerSixExpiresAt",
                  reauthRequest: "Auth > Player six > Use guest"
              }
          };

          const BUFFER_MS = 30_000;
          const REFRESH_TIMEOUT_MS = 3000;

          function getLocationNames() {
              const executionLocation = pm.execution && pm.execution.location;

              if (Array.isArray(executionLocation)) {
                  return executionLocation
                      .map((entry) => (typeof entry === "string" ? entry : entry && entry.name))
                      .filter(Boolean);
              }

              if (executionLocation && Array.isArray(executionLocation.current)) {
                  return executionLocation.current
                      .map((entry) => (typeof entry === "string" ? entry : entry && entry.name))
                      .filter(Boolean);
              }

              return [];
          }

          function clearAuthorizationHeader() {
              pm.request.headers.remove("Authorization");
          }

          function setAuthorizationHeader(token) {
              pm.request.headers.upsert({
                  key: "Authorization",
                  value: `Bearer ${token}`
              });
          }

          function getExpiresAt(variableName) {
              return Number(pm.environment.get(variableName) || 0);
          }

          function persistUserSession(playerConfig, response) {
              const now = Date.now();

              pm.environment.set(playerConfig.accessToken, response.accessToken);
              pm.environment.set(
                  playerConfig.accessTokenExpiresAt,
                  String(now + (response.accessTokenExpiresIn * 1000))
              );

              if (playerConfig.refreshTokenVariable && response.refreshToken) {
                  pm.environment.set(playerConfig.refreshTokenVariable, response.refreshToken);
              }

              if (playerConfig.refreshTokenExpiresAt && response.refreshTokenExpiresIn) {
                  pm.environment.set(
                      playerConfig.refreshTokenExpiresAt,
                      String(now + (response.refreshTokenExpiresIn * 1000))
                  );
              }
          }

          const locationNames = getLocationNames();
          const playerName = locationNames.find((name) =>
              Object.prototype.hasOwnProperty.call(PLAYER_CONFIG, name)
          );
          const shouldHandleRequest = !locationNames.includes("Auth") && Boolean(playerName);

          if (!shouldHandleRequest) {
              clearAuthorizationHeader();
              return;
          }

          const player = PLAYER_CONFIG[playerName];
          const now = Date.now();
          const accessToken = pm.environment.get(player.accessToken) || "";
          const accessTokenExpiresAt = getExpiresAt(player.accessTokenExpiresAt);
          const accessTokenStillValid = Boolean(accessToken) && accessTokenExpiresAt > (now + BUFFER_MS);

          if (accessTokenStillValid) {
              setAuthorizationHeader(accessToken);
              return;
          }

          clearAuthorizationHeader();

          if (!player.refreshTokenVariable) {
              throw new Error(
                  `${playerName} no tiene una sesion guest vigente. Ejecuta ${player.reauthRequest} antes de reintentar esta request.`
              );
              return;
          }

          const refreshToken = pm.environment.get(player.refreshTokenVariable) || "";
          const refreshTokenExpiresAt = getExpiresAt(player.refreshTokenExpiresAt);

          if (!refreshToken || refreshTokenExpiresAt <= now) {
              throw new Error(
                  `${playerName} no tiene un refresh token vigente. Ejecuta ${player.reauthRequest} antes de reintentar esta request.`
              );
              return;
          }

          try {
              const response = await pm.sendRequest({
                  url: "{{URL_BASE_TRUCO_HTTP}}/auth/refresh",
                  method: "POST",
                  auth: {
                      type: "noauth"
                  },
                  timeout: REFRESH_TIMEOUT_MS,
                  header: {
                      "Content-Type": "application/json"
                  },
                  body: {
                      mode: "raw",
                      raw: JSON.stringify({
                          refreshToken
                      })
                  }
              });

              if (!response || response.code !== 200) {
                  throw new Error(
                      `El refresh de ${playerName} fallo con status ${response ? response.code : "desconocido"}. Ejecuta ${player.reauthRequest}.`
                  );
                  return;
              }

              persistUserSession(player, response.json());

              const refreshedAccessToken = pm.environment.get(player.accessToken) || "";
              if (!refreshedAccessToken) {
                  throw new Error(
                      `El refresh de ${playerName} no devolvio un access token utilizable. Ejecuta ${player.reauthRequest}.`
                  );
                  return;
              }

              setAuthorizationHeader(refreshedAccessToken);
          } catch (error) {
              throw new Error(
                  `No se pudo refrescar la sesion de ${playerName} dentro de ${REFRESH_TIMEOUT_MS}ms: ${error.message}`
              );
          }
      })();
    language: text/javascript
